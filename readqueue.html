<!-- readqueue.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/static/queue.css" />
    <title>Biblioteca | Exodus</title>
  </head>
  <body>
    <main class="container">
      <div class="header-actions">
        <h1>Read queue</h1>
        <button id="btn-open-modal" class="btn-primary">Add article</button>
      </div>

      <nav class="tabs-nav">
        <button class="tab-link active" data-target="tab-queue">
          Current queue
        </button>
        <button class="tab-link" data-target="tab-archive">Archive</button>
      </nav>

      <hr class="tab-divider" />

      <div id="tab-queue" class="tab-content">
        <section>
          <h2 class="section-title">Reading</h2>
          <div id="reading-section" class="grid-container"></div>
        </section>
        <section>
          <h2 class="section-title">To Read</h2>
          <div id="pending-section" class="grid-container"></div>
        </section>
      </div>

      <div id="tab-archive" class="tab-content hidden">
        <section>
          <h2 class="section-title">Archive</h2>
          <div class="filters">
            <input
              type="number"
              id="filter-score"
              placeholder="Score"
              min="1"
              max="10"
            />
            <input type="date" id="filter-date" />
          </div>
          <div id="archive-section" class="grid-container"></div>
        </section>
      </div>
    </main>

    <!-- Add modal -->
    <div id="modal-form" class="modal hidden">
      <div class="modal-content">
        <h2>Añadir a la cola</h2>
        <form id="add-read-form">
          <input type="text" name="title" placeholder="Title" required />
          <input type="url" name="url" placeholder="URL" required />
          <label
            ><input type="checkbox" name="isReading" /> ¿Start it
            already?</label
          >
          <button type="submit">Save</button>
          <button
            type="button"
            onclick="
              document.getElementById('modal-form').classList.add('hidden')
            "
          >
            Cancel
          </button>
        </form>
      </div>
    </div>

    <!-- Rate modal -->
    <div id="score-modal" class="modal hidden">
      <div class="modal-content">
        <h3>Finalizar lectura</h3>
        <p>Rate the article 1-10</p>
        <input type="number" id="input-score" min="1" max="10" value="5" />
        <button id="btn-confirm-score">Confirm</button>
        <button
          type="button"
          onclick="
            document.getElementById('score-modal').classList.add('hidden')
          "
        >
          Cancel
        </button>
      </div>
    </div>

    <script src="/static/readqueue.js"></script>
  </body>
</html>
